<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWD 顧問專用 - 100% 精準保費對比工具</title>
    <!-- 引入 Chart.js 用於圖表繪製 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入 html2pdf.js 用於匯出 PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --fwd-orange: #ff6600; --fwd-dark: #333; --fwd-bg: #f9f9f9; --fwd-blue: #00a1e0; --fwd-red: #d32f2f; }
        body { font-family: 'Segoe UI', 'PingFang HK', sans-serif; margin: 0; background: var(--fwd-bg); }
        .header { background: var(--fwd-orange); color: white; padding: 25px; text-align: center; }
        .container { max-width: 950px; margin: 20px auto; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .input-card { background: #fdfdfd; border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn-calc { background: var(--fwd-orange); color: white; border: none; width: 100%; padding: 18px; border-radius: 8px; font-size: 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .result-panel { margin-top: 25px; padding: 25px; border: 2px solid var(--fwd-orange); border-radius: 12px; background: #fffaf5; }
        .premium-text { font-size: 38px; color: var(--fwd-orange); font-weight: bold; margin: 10px 0; }
        
        /* 對比框樣式 */
        .comparison-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .comp-box { padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #ddd; }
        .comp-box.no-inflation { background: #f0f0f0; }
        .comp-box.with-inflation { background: #fff1f0; border-color: #ffa39e; }
        .val-large { font-size: 32px; font-weight: bold; display: block; margin-top: 10px; }
        .diff-tag { display: inline-block; margin-top: 10px; padding: 5px 12px; background: var(--fwd-red); color: white; border-radius: 20px; font-weight: bold; font-size: 14px; }
        
        .highlight-box { background: #eef7ff; padding: 15px; border-left: 5px solid #00a1e0; margin-bottom: 20px; }
        .inflation-card { background: #fff0f0; border: 1px solid #ffcccc; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .footer-info { font-size: 12px; color: #888; border-top: 1px solid #eee; padding-top: 10px; margin-top: 20px; }

        /* 新增：圖表與 PDF 按鈕樣式 */
        .chart-container { margin-top: 30px; padding: 15px; background: white; border-radius: 8px; border: 1px solid #eee; }
        .btn-pdf { background: #d32f2f; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; transition: background 0.3s; }
        .btn-pdf:hover { background: #b71c1c; }

        /* 新增：避免 PDF 匯出時區塊被從中切斷跑位 */
        .input-card, .highlight-box, .inflation-card, .comparison-container, .chart-container, .result-panel { 
            page-break-inside: avoid; 
            break-inside: avoid; 
        }
    </style>
</head>
<body>

<!-- 將需要匯出 PDF 的範圍包裹起來 -->
<div id="exportArea">
    <div class="header">
        <h1>FWD 富衛醫保精算系統</h1>
        <p>退休保費支出對比分析</p>
    </div>

    <div class="container">
        <div class="input-card">
            <label>1. 選擇產品計劃</label>
            <select id="prod" onchange="initVersions()">
                <option value="vTheOne">至．衛一 (vTheOne) - 私家房</option>
                <option value="vPrime">尊衛您 (vPrime) - 半私家房</option>
                <option value="vBooster">倍衛您 (vBooster) - 普通房</option>
                <option value="vFamily">醫家保 (vFamily) - 普通房</option>
                <option value="vCANsurance">易衛您 (vCANsurance) - 普通房</option>
                <option value="vCareSupreme">更衛您 (vCare Supreme) - 優越版</option>
            </select>
            
            <div class="row" style="margin-top:15px;">
                <div>
                    <label>2. 計劃版本</label>
                    <select id="version" onchange="initDeds()"></select>
                </div>
                <div>
                    <label>3. 自付費 (HKD)</label>
                    <select id="ded"></select>
                </div>
            </div>

            <div class="row">
                <div>
                    <label>4. 受保人性別</label>
                    <select id="gender">
                        <option value="Both">不限性別 (Unisex / 男女同價)</option>
                        <option value="Male">男性 (Male)</option>
                        <option value="Female">女性 (Female)</option>
                    </select>
                </div>
                <div>
                    <label>5. 客戶當前年齡 (下一次生日)</label>
                    <input type="number" id="currentAge" value="50">
                </div>
            </div>
        </div>

        <div class="inflation-card">
            <label>6. 預期年度醫療通脹 (%)</label>
            <input type="number" id="inflationRate" value="3.0" step="0.1">
        </div>

        <div class="highlight-box">
            <label style="color:#0056b3;">7. 支出對比範圍 (例如 66-85 歲退休期)</label>
            <div class="row">
                <div>
                    <small>起始歲數</small>
                    <input type="number" id="startAge" value="66">
                </div>
                <div>
                    <small>結束歲數</small>
                    <input type="number" id="endAge" value="85">
                </div>
            </div>
        </div>

        <!-- 匯出 PDF 時會隱藏這個計算按鈕 -->
        <button id="calcBtn" class="btn-calc" onclick="calculate()">立即進行對比分析</button>

        <div id="result" class="result-panel" style="display:none;">
            <div style="text-align: center;">
                <p id="singleLabel" style="font-weight:bold; margin:0;"></p>
                <div class="premium-text" id="singleVal"></div>
                <small style="color:#888;">(現行保費表基準)</small>
            </div>

            <hr style="border: 0; border-top: 1px dashed #ccc; margin: 25px 0;">

            <p id="rangeLabel" style="font-weight:bold; text-align:center;"></p>
            
            <div class="comparison-container">
                <div class="comp-box no-inflation">
                    <span style="color:#666;">不考慮通脹<br>(基於現行保費表)</span>
                    <span class="val-large" id="sumNoInflation" style="color:#444;"></span>
                </div>
                <div class="comp-box with-inflation">
                    <span style="color:var(--fwd-red);">考慮醫療通脹<br>(未來預計支出)</span>
                    <span class="val-large" id="sumWithInflation" style="color:var(--fwd-red);"></span>
                </div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <div class="diff-tag">
                    ⚠️ 通脹預計增加開支：<span id="diffVal"></span>
                </div>
                <p style="font-size:14px; color:#555; margin-top:15px;">
                    平均每年支出預計 (含通脹): <span id="avgVal" style="font-weight:bold; color:var(--fwd-red);"></span>
                </p>
            </div>

            <!-- 新增：圖表顯示區域 -->
            <div class="chart-container">
                <canvas id="premiumChart"></canvas>
            </div>

            <div class="footer-info">
                * 數據源：vTheOne (2025.06版), vPrime/vBooster (2026版), vCANsurance (2025.06版), vFamily (2024.03版), 更衛您(優越版) (2025.06版)。<br>
                * 計算公式：未來第 N 年保費 = 當前費率 × (1 + 通脹%) ^ (目標年齡 - 當前年齡)。
            </div>
            
            <!-- 新增：PDF 匯出按鈕 -->
            <button id="pdfBtn" class="btn-pdf" onclick="exportToPDF()">📄 匯出完整分析報告 (PDF給客戶)</button>
        </div>
    </div>
</div>

function initDeds() {
    const p = document.getElementById('prod').value;
    const ver = document.getElementById('version').value;
    const d = document.getElementById('ded');
    d.innerHTML = "";
    
    if (premiumDB[p] && premiumDB[p][ver]) {
        const source = premiumDB[p][ver];
        // 對於 vFamily/vCANsurance, key 是 "0", 裡面包含 Male/Female
        // 我們只需要列出 keys (自付費)
        const dedList = Object.keys(source).sort((a,b) => parseInt(a) - parseInt(b));
        
        dedList.forEach(k => {
            d.innerHTML += `<option value="${k}">${k === "0" ? "$0 (全數保障/無自付費)" : "$" + parseInt(k).toLocaleString()}</option>`;
        });
    }
}

// 宣告全域的 Chart 實例，方便每次計算時更新
let premiumChartInstance = null;

function calculate() {
    const p = document.getElementById('prod').value;
    const ver = document.getElementById('version').value;
    const ded = document.getElementById('ded').value;
    const currentAge = parseInt(document.getElementById('currentAge').value);
    const inflation = parseFloat(document.getElementById('inflationRate').value) / 100;
    const start = parseInt(document.getElementById('startAge').value);
    const end = parseInt(document.getElementById('endAge').value);
    const gender = document.getElementById('gender').value;

    // 檢查數據是否存在
    if (!premiumDB[p] || !premiumDB[p][ver] || !premiumDB[p][ver][ded]) {
        alert("數據庫中找不到此組合的數據，請重新選擇。");
        return;
    }

    let premiumData = premiumDB[p][ver][ded];

    // 特殊處理：如果有區分性別 (如 vFamily, vCANsurance)，讀取對應性別的數據
    if (premiumData.Male && premiumData.Female) {
        if (gender === 'Both') {
            alert("此計劃區分性別，請在上方選擇「男性」或「女性」以獲得準確報價。");
            return;
        }
        premiumData = premiumData[gender];
    }
    
    const singleVal = premiumData[currentAge] || 0;
    
    // --- 加總邏輯與圖表數據準備 ---
    let sumNoInflation = 0;
    let sumWithInflation = 0;
    
    // 準備圖表所需的陣列
    let chartLabels = [];
    let chartDataNoInf = [];
    let chartDataWithInf = [];
    let chartCumNoInf = []; // 累積保費(無通脹)
    let chartCumWithInf = []; // 累積保費(含通脹)

    for(let i = start; i <= end; i++) {
        // 如果超過數據庫最大年齡 (例如100)，取最大年齡的值
        const maxAge = 100; 
        const lookupAge = i > maxAge ? maxAge : i;
        
        const basePremium = premiumData[lookupAge] || 0;
        
        if (basePremium === 0 && i <= maxAge) {
            console.warn(`Missing premium for age ${i}`);
        }

        // 通脹複利計算
        const yearsToFuture = i - currentAge;
        const inflationFactor = Math.pow(1 + inflation, yearsToFuture);
        const inflatedPremium = basePremium * inflationFactor;

        // 加總計算
        sumNoInflation += basePremium;
        sumWithInflation += inflatedPremium;

        // 推入圖表陣列
        chartLabels.push(i + ' 歲');
        chartDataNoInf.push(Math.round(basePremium));
        chartDataWithInf.push(Math.round(inflatedPremium));
        chartCumNoInf.push(Math.round(sumNoInflation));
        chartCumWithInf.push(Math.round(sumWithInflation));
    }

    const difference = sumWithInflation - sumNoInflation;

    // 顯示結果
    document.getElementById('result').style.display = "block";
    document.getElementById('singleLabel').innerText = `客戶當前 ${currentAge} 歲 年度保費查詢：`;
    document.getElementById('singleVal').innerText = singleVal > 0 ? `HK$ ${singleVal.toLocaleString()}` : "超出範圍";
    
    document.getElementById('rangeLabel').innerText = `${start} 歲至 ${end} 歲 預期總預算比較 (${end-start+1}年):`;
    document.getElementById('sumNoInflation').innerText = `HK$ ${Math.round(sumNoInflation).toLocaleString()}`;
    document.getElementById('sumWithInflation').innerText = `HK$ ${Math.round(sumWithInflation).toLocaleString()}`;
    document.getElementById('diffVal').innerText = `HK$ ${Math.round(difference).toLocaleString()}`;
    document.getElementById('avgVal').innerText = `HK$ ${Math.round(sumWithInflation/(end-start+1)).toLocaleString()}`;

    // --- 繪製線性圖表 ---
    renderChart(chartLabels, chartDataNoInf, chartDataWithInf, chartCumNoInf, chartCumWithInf);
}

// 繪製與更新 Chart 的邏輯
function renderChart(labels, dataNoInf, dataWithInf, cumNoInf, cumWithInf) {
    const ctx = document.getElementById('premiumChart').getContext('2d');
    
    // 如果圖表已存在，先銷毀才能重新繪製
    if (premiumChartInstance) {
        premiumChartInstance.destroy();
    }

    premiumChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: '當年保費 (含通脹)',
                    data: dataWithInf,
                    borderColor: '#d32f2f',
                    backgroundColor: 'rgba(211, 47, 47, 0.1)',
                    fill: true,
                    tension: 0.3,
                    customCumulative: cumWithInf // 儲存累積數據供 tooltip 讀取
                },
                {
                    label: '當年保費 (無通脹)',
                    data: dataNoInf,
                    borderColor: '#666',
                    backgroundColor: 'transparent',
                    borderDash: [5, 5],
                    fill: false,
                    tension: 0.3,
                    customCumulative: cumNoInf // 儲存累積數據供 tooltip 讀取
                }
            ]
        },
        options: {
            responsive: true,
            // 新增 interaction 設定，讓滑鼠懸停時可以同時選中該年份的所有數據
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                tooltip: {
                    callbacks: {
                        // 自定義懸停顯示的內容
                        label: function(context) {
                            let label = context.dataset.label || '';
                            let currentVal = context.parsed.y;
                            let cumulativeVal = context.dataset.customCumulative[context.dataIndex];
                            
                            // 回傳陣列以換行顯示：[當年保費, 累積總保費]
                            return [
                                `${label}: HK$ ${currentVal.toLocaleString()}`,
                                `累積總保費: HK$ ${cumulativeVal.toLocaleString()}`
                            ];
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) {
                            return 'HK$ ' + value.toLocaleString();
                        }
                    }
                }
            }
        }
    });
}

// --- 匯出 PDF 的邏輯 ---
function exportToPDF() {
    // 解決因為頁面滾動導致 html2canvas 截圖不全/下方消失的問題
    window.scrollTo(0, 0);

    // 獲取整個要匯出的區塊
    const element = document.getElementById('exportArea');
    
    // 隱藏在 PDF 中不必要的按鈕
    const calcBtn = document.getElementById('calcBtn');
    const pdfBtn = document.getElementById('pdfBtn');
    calcBtn.style.display = 'none';
    pdfBtn.style.display = 'none';

    // 儲存原始樣式
    const originalWidth = element.style.width;
    const originalMaxWidth = element.style.maxWidth;
    const originalMargin = element.style.margin;
    const originalBg = element.style.backgroundColor;

    // 【終極修正：利用縮放原理包覆整個邊界】
    // 將外層框架設為 1000px，而內部的 .container 是 950px 並置中
    // 這樣左右就會自然產生 25px 的安全距離（完美包覆陰影，絕對不切斷）
    element.style.width = '1000px';
    element.style.maxWidth = '1000px';
    element.style.margin = '0'; 
    element.style.backgroundColor = '#f9f9f9'; // 確保背景顏色統一

    // 強制圖表調整大小以配合新的固定寬度
    if (premiumChartInstance) {
        premiumChartInstance.resize();
    }

    // 設定 html2pdf 參數
    const opt = {
        margin:       [15, 10, 15, 10], // 上, 右, 下, 左 邊距 (加大上下留白)
        filename:     'FWD_保費對比分析報告.pdf',
        image:        { type: 'jpeg', quality: 1.0 },
        html2canvas:  { 
            scale: 2, 
            useCORS: true, 
            scrollY: 0, 
            scrollX: 0,
            windowWidth: 1000, // 視窗鎖定 1000
            width: 1000        // 畫布擷取寬度鎖定 1000 (剛好包覆上方設定的 1000px element)
        },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
    };

    // 延遲 600 毫秒，給予圖表 Canvas 充足的「重繪動畫時間」，確保最右側的點和線完全渲染完畢
    setTimeout(() => {
        html2pdf().set(opt).from(element).save().then(() => {
            // 恢復原始版面狀態
            calcBtn.style.display = 'block';
            pdfBtn.style.display = 'flex';
            element.style.width = originalWidth;
            element.style.maxWidth = originalMaxWidth;
            element.style.margin = originalMargin;
            element.style.backgroundColor = originalBg;
            if (premiumChartInstance) premiumChartInstance.resize();
        }).catch(err => {
            console.error("PDF 匯出失敗：", err);
            calcBtn.style.display = 'block';
            pdfBtn.style.display = 'flex';
            element.style.width = originalWidth;
            element.style.maxWidth = originalMaxWidth;
            element.style.margin = originalMargin;
            element.style.backgroundColor = originalBg;
            if (premiumChartInstance) premiumChartInstance.resize();
            alert("PDF 匯出時發生錯誤，請稍後再試。");
        });
    }, 600);
}
